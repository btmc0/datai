version: 2

# Snapshot builds (PRs, local dev) get a version that is traceable to a
# real commit on the source branch. Format: <next-patch>-snapshot-<short>.
# With fetch-depth: 0 in CI, .Version is git-describe-derived (e.g. 1.5.0)
# so incpatch yields 1.5.1; without tags it falls back to 0.0.0.
# .ShortCommit reflects whatever ref was checked out — pr-build.yml pins
# this to the PR head SHA so the version maps directly to a commit a user
# can browse.
snapshot:
  version_template: '{{ incpatch .Version }}-snapshot-{{ .ShortCommit }}'

before:
  hooks:
    # VERSION must be passed explicitly: vite reads it from process.env
    # at build time and bakes it into the bundle as __JUMP_VERSION__.
    # Without this the frontend always reports 'dev' even on tagged
    # releases, while jumpd reports the real version, which makes the
    # home page footer permanently show "Frontend vdev / reload to
    # update" because the two never match.
    - bash -c 'cd apps/jump-web && VERSION={{ .Version }} npx vite build'
    - bash -c 'rm -rf services/jumpd/cmd/jumpd/web/assets services/jumpd/cmd/jumpd/web/favicon.svg services/jumpd/cmd/jumpd/web/manifest.json && cp -r apps/jump-web/dist/* services/jumpd/cmd/jumpd/web/'

builds:
  - id: jumpd
    main: ./cmd/jumpd
    dir: services/jumpd
    binary: jumpd
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }}

  - id: jump
    main: ./cmd/jump
    dir: cli/jump
    binary: jump
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }}

  - id: jump-relayd
    main: ./cmd/jump-relayd
    dir: services/jump-relayd
    binary: jump-relayd
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    ids:
      - jumpd
      - jump
      - jump-relayd
    name_template: "jump_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: darwin
        formats:
          - zip

checksum:
  name_template: "checksums.txt"

changelog:
  disable: true
