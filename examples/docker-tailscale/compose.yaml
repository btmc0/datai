services:
  dev:
    build: .
    container_name: dev
    restart: unless-stopped
    environment:
      - TERM=xterm-256color
      - SHELL=/usr/bin/fish  # or /bin/bash, /bin/zsh
    volumes:
      # Persistent workspace for repos
      - ./data/workspace:/workspace
      # jump config and Tailscale state (container-specific)
      - ./data/jump-config:/root/.config/jump
      - ./data/jump-state:/root/.local/state/jump
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8790/ >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
